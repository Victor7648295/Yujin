<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title th:text="${product.title}">Подробная информация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
        </div>

        <div class="header-actions">
            <a sec:authorize="!hasRole('ADMIN')" th:href="@{/product/create}" href="/product/create" class="btn-green">Подать объявление</a>
            <a sec:authorize="!hasRole('ADMIN')" th:href="@{/my-products}" href="/my-products" class="btn-green">Мои объявления</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/moderation}" href="/admin/moderation" class="btn-green">Панель управления</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/profile/edit}" href="/profile/edit" class="btn-green">Редактировать профиль</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/logout}" href="/logout" class="btn-dark">Выход</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}" href="/login" class="btn-dark">Войти</a>
        </div>
    </header>

    <div class="ad-page">

        <div class="ad-main">

            <div class="ad-image">
                <img th:src="@{${product.imagePath}}" th:alt="${product.title}">
            </div>

            <div class="ad-details">
                <h1 th:text="${product.title}">Название товара</h1>

                <p class="ad-field ad-category">
                    <span class="ad-label">Категория:</span>
                    <span class="ad-value" th:text="${product.category}">Электроника</span>
                </p>
                <p class="ad-field ad-type">
                    <span class="ad-label">Тип:</span>
                    <span class="ad-value" th:text="${product.condition?.name}">Местный</span>
                </p>
                <p class="ad-field ad-location">
                    <span class="ad-label">Регион:</span>
                    <span class="ad-value" th:text="${product.region}">Минск</span>
                </p>
                <p class="ad-field ad-price">
                    <span class="ad-label">Цена:</span>
                    <span class="ad-value" th:text="${product.price} + ' р'">200 р</span>
                </p>

                <div class="seller">
                    <p class="ad-field">
                        <span class="ad-label">Контактное лицо:</span>
                        <span class="ad-value" th:text="${product.sellerName}">Продавец</span>
                    </p>
                    <button type="button" id="callBtn" class="btn-green"
                            th:data-phone="${product.phone}"
                            th:data-seller="${product.sellerName}">
                        Позвонить
                    </button>
                </div>
            </div>

        </div>

        <div class="ad-description">
            <h2>Описание</h2>
            <p th:text="${product.description}">Описание товара</p>
        </div>

    </div>

    <!-- ================= МОДАЛЬНЫЕ ОКНА ================= -->

    <!-- Затемнение -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <!-- Модалка звонка -->
    <div class="modal" id="callModal">
        <div class="modal-card">
            <h2 id="modalUserName" th:text="${product.sellerName}">Продавец</h2>
            <div class="phone-number" id="modalPhoneNumber" th:text="${product.phone}">+375 (29) 999-99-99</div>
            <button type="button" class="btn-dark full-btn" id="closeCallModalBtn">
                Закрыть
            </button>
        </div>
    </div>

    <!-- Модалка выхода -->
    <div class="modal" id="logoutModal">
        <div class="modal-card">
            <h2>Выход из системы</h2>
            <div class="logout-buttons">
                <button type="button" class="btn-red" id="confirmLogoutBtn">
                    Выйти
                </button>
                <button type="button" class="btn-dark" id="cancelLogoutBtn">
                    Отмена
                </button>
            </div>
        </div>
    </div>

    <!-- Подключение JS -->
    <script th:src="@{/js/modals.js}" src="/js/modals.js"></script>
</body>

</html>
