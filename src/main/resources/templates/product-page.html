<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${product.title}">Подробная информация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <a th:href="@{/}" href="/">Доска объявлений</a>
        </div>

        <div class="header-actions">
            <a th:href="@{/product/create}" href="/product/create" class="btn-green">+ Подать объявление</a>
            <a th:href="@{/my-products}" href="/my-products" class="btn-green">Мои объявления</a>
            <a th:href="@{/profile/edit}" href="/profile/edit" class="profile-link">Редактировать профиль</a>
            <a th:href="@{/logout}" href="/logout" class="profile-link">Выход</a>
        </div>
    </header>

    <div class="ad-page">

        <div class="ad-main">

            <div class="ad-image">
                <img th:src="@{${product.imagePath}}" th:alt="${product.title}">
            </div>

            <div class="ad-details">
                <div class="ad-price" th:text="${product.price} + ' р'">0 р</div>
                <h1 th:text="${product.title}">Название товара</h1>

                <p class="ad-category"
                   th:text="'Категория: ' + ${product.category}">Категория:</p>
                <p class="ad-location" th:text="${product.region}">Регион</p>

                <div class="seller">
                    <p>Продавца зовут: <strong th:text="${product.sellerName}">Продавец</strong></p>
                    <button type="button" id="callBtn" class="btn-green"
                            th:data-phone="${product.phone}"
                            th:data-seller="${product.sellerName}">
                        Позвонить
                    </button>
                </div>
            </div>

        </div>

        <div class="ad-description">
            <h2>Описание</h2>
            <p th:text="${product.description}">Описание товара</p>
        </div>

    </div>

    <!-- ================= МОДАЛЬНЫЕ ОКНА ================= -->

    <!-- Затемнение -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <!-- Модалка звонка -->
    <div class="modal" id="callModal">
        <div class="modal-card">
            <h2 id="modalUserName" th:text="${product.sellerName}">Продавец</h2>
            <div class="phone-number" id="modalPhoneNumber" th:text="${product.phone}">+375 (29) 999-99-99</div>
            <p>Пожалуйста, скажите продавцу, что звоните по объявлению</p>
            <button type="button" class="btn-dark full-btn" id="closeCallModalBtn">
                Закрыть
            </button>
        </div>
    </div>

    <!-- Модалка выхода -->
    <div class="modal" id="logoutModal">
        <div class="modal-card">
            <h2>Выход из системы</h2>
            <div class="logout-buttons">
                <button type="button" class="btn-red" id="confirmLogoutBtn">
                    Выйти
                </button>
                <button type="button" class="btn-dark" id="cancelLogoutBtn">
                    Отмена
                </button>
            </div>
        </div>
    </div>

    <!-- Подключение JS -->
    <script th:src="@{/js/modals.js}" src="/js/modals.js"></script>
</body>

</html>
