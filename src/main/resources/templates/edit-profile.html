<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Редактировать профиль</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <a th:href="@{/}" href="/">Доска объявлений</a>
    </div>

    <div class="header-actions">
        <a sec:authorize="!hasRole('ADMIN')" th:href="@{/product/create}" href="/product/create" class="btn-green">+ Подать объявление</a>
        <a sec:authorize="!hasRole('ADMIN')" th:href="@{/my-products}" href="/my-products" class="btn-green">Мои объявления</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/moderation}" href="/admin/moderation" class="btn-green">Админ-панель</a>
        <a th:href="@{/logout}" href="/logout" class="profile-link">Выход</a>
    </div>
</header>

<div class="profile-container">

    <div class="profile-card">

        <h2>Редактировать профиль</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/profile/edit}" th:object="${profile}" method="post">

            <label>Имя</label>
            <input type="text" th:field="*{firstName}" required>

            <label>Фамилия</label>
            <input type="text" th:field="*{lastName}" required>

            <label>Email</label>
            <input type="email" th:field="*{email}" required>

            <label>Текущий пароль</label>
            <input type="password" th:field="*{currentPassword}" required>

            <label>Новый пароль</label>
            <input type="password" th:field="*{newPassword}" placeholder="Введите новый пароль">

            <label>Повторите пароль</label>
            <input type="password" th:field="*{confirmPassword}" placeholder="Введите ещё раз новый пароль">

            <button type="submit" class="btn-green full-btn">
                Сохранить изменения
            </button>

        </form>

    </div>

</div>

<!-- Подключение JS -->
<script th:src="@{/js/modals.js}" src="/js/modals.js"></script>

</body>

</html>
