<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Новое объявление</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <a href="index.html">Доска объявлений</a>
        </div>
        <div class="header-actions">
            <a href="my-ads.html" class="btn-green">Мои объявления</a>
            <a href="edit-profile.html" class="profile-link">Редактировать профиль</a>
            <span class="logout-link">Выход</span>
        </div>
    </header>

    <!-- ФОРМА -->
    <div class="form-page">
        <div class="form-card">

            <h2>Редактировать объявление</h2>

            <form id="adForm">

                <!-- Название -->
                <label>Название объявления</label>
                <input type="text" name="title" placeholder="Введите название объявления" required>

                <!-- Категория -->
                <label>Категория</label>
                <select name="category" required>
                    <option value="" disabled selected hidden>Выберите категорию</option>
                    <option value="1">Электроника</option>
                    <option value="2">Одежда</option>
                    <option value="3">Авто</option>
                </select>

                <!-- Фото -->
                <label>Добавить фото</label>
                <input type="file" id="photoInput" name="photo" accept="image/*">
                <img id="preview" class="photo-preview" alt="preview">

                <!-- Описание -->
                <label>Описание</label>
                <textarea name="description" placeholder="Расскажите подробности"></textarea>

                <!-- Цена -->
                <label>Цена</label>
                <input type="number" id="price" name="price" placeholder="Введите цену" min="0" step="1" required>

                <!-- Состояние -->
                <label>Состояние</label>
                <div class="condition-switch">
                    <button type="button" class="condition-btn" data-value="NEW">Новое</button>
                    <button type="button" class="condition-btn" data-value="USED">Б/у</button>
                </div>
                <input type="hidden" name="condition" id="conditionValue" required>

                <!-- Регион -->
                <label>Местоположение</label>
                <select name="region" required>
                    <option value="" disabled selected hidden>Выберите регион</option>
                    <option value="1">Москва</option>
                    <option value="2">СПб</option>
                    <option value="3">Казань</option>
                </select>

                <!-- Телефон -->
                <label>Телефон</label>
                <input type="tel" name="phone" placeholder="Введите телефон" pattern="[0-9+()-\s]{6,}" required>

                <!-- Кнопка -->
                <button type="submit" class="btn-green full-btn">
                    Отправить на модерацию
                </button>

            </form>

        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
