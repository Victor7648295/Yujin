<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>BSUIR TRANSFERMARKT</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
    </div>

    <div class="search">
        <form th:action="@{/search-by-name}" method="get" class="search-form">
            <input type="text" name="query" th:value="${searchQuery}" placeholder="Поиск">
            <button type="submit" class="btn-dark">Найти</button>
        </form>
    </div>

    <div class="header-actions">
        <a sec:authorize="!hasRole('ADMIN')" th:href="@{/product/create}" href="/product/create" class="btn-green">Подать объявление</a>
        <a sec:authorize="!hasRole('ADMIN')" th:href="@{/my-products}" href="/my-products" class="btn-green">Мои объявления</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/moderation}" href="/admin/moderation" class="btn-green">Панель управления</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/profile/edit}" href="/profile/edit" class="btn-green">Редактировать профиль</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/logout}" href="/logout" class="btn-dark">Выход</a>
        <a sec:authorize="isAnonymous()" th:href="@{/login}" href="/login" class="btn-dark">Войти</a>
    </div>
</header>

<div class="layout">

    <!-- ФИЛЬТРЫ -->
    <aside class="filters-wrapper">
        <div class="filters">
            <h3>Фильтры</h3>

            <!-- ДОБАВЛЕНА ФОРМА -->
            <form id="filterForm" action="/filter" method="get">

                <div class="filter-field">
                    <label>Цена</label>
                    <div class="price-row">
                        <input type="number" name="priceFrom" id="priceFrom" th:value="${priceFrom}" placeholder="От">
                        <input type="number" name="priceTo" id="priceTo" th:value="${priceTo}" placeholder="До">
                    </div>
                </div>

                <div class="filter-field">
                    <label>Регион</label>
                    <select name="region" id="regionFilter">
                        <option value="">Все регионы</option>
                        <option th:each="region : ${regions}"
                                th:value="${region}"
                                th:text="${region}"
                                th:selected="${region == selectedRegion}"></option>
                    </select>
                </div>

                <div class="filter-field">
                    <label>Категория</label>
                    <select name="category" id="categoryFilter">
                        <option value="">Все категории</option>
                        <option th:each="category : ${categories}"
                                th:value="${category}"
                                th:text="${category}"
                                th:selected="${category == selectedCategory}"></option>
                    </select>
                </div>

                <div class="filter-field">
                    <label>Тип</label>
                    <div class="condition-row">
                        <button type="button" class="condition-btn" data-value="Местный"
                                th:classappend="${selectedCondition == 'Местный'} ? 'active'">Местный</button>
                        <button type="button" class="condition-btn" data-value="Международный"
                                th:classappend="${selectedCondition == 'Международный'} ? 'active'">Международный</button>
                    </div>
                </div>

                <!-- Скрытое поле для состояния -->
                <input type="hidden" name="condition" id="conditionInput" value="">

                <button type="submit" class="btn-green full">
                    Применить фильтр
                </button>

            </form>
        </div>
    </aside>

    <!-- ТОВАРЫ -->
    <main class="products-wrapper">
        <div id="productsList">
            <div class="product-card" th:each="product : ${products}"
                 th:data-price="${product.price}"
                 th:data-region="${product.region}"
                 th:data-category="${product.category}"
                 th:data-condition="${product.condition?.name}">

                <img th:src="@{${product.imagePath}}" th:alt="${product.title}">

                <div class="product-info">
                    <h3 th:text="${product.title}">Название товара</h3>

                    <div class="meta">
                        <p class="ad-field">
                            <span class="ad-label">Тип:</span>
                            <span th:text="${product.condition?.name}">Тип</span>
                        </p>
                        <p class="ad-field">
                            <span class="ad-label">Регион:</span>
                            <span th:text="${product.region}">Регион</span>
                        </p>
                        <p class="ad-field">
                            <span class="ad-label">Цена:</span>
                            <span th:text="${product.price} + ' р'">0 р</span>
                        </p>
                    </div>
                </div>

                <div class="product-buttons">
                    <a th:href="@{'/product/' + ${product.id}}" class="btn-green">Подробнее</a>
                    <button type="button" class="btn-light show-phone-btn"
                            th:data-phone="${product.phone}"
                            th:data-seller="${product.sellerName}">Показать телефон</button>
                </div>
            </div>
        </div>

        <!-- Сообщение, если товаров нет -->
        <div th:if="${products.empty}" class="empty-message">
            <p style="color: white;">Объявлений не найдено</p>
        </div>
    </main>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="modalOverlay"></div>

<div class="modal" id="callModal">
    <div class="modal-card">
        <h2 id="modalUserName">Продавец</h2>
        <div class="phone-number" id="modalPhoneNumber">+375 (29) 999-99-99</div>
        <button type="button" class="btn-dark full-btn" id="closeCallModalBtn">
            Закрыть
        </button>
    </div>
</div>

<script th:src="@{/js/script.js}" src="/js/script.js"></script>
<script th:src="@{/js/modals.js}" src="/js/modals.js"></script>

<!-- Фильтр по состоянию: запись выбранного значения в скрытое поле condition -->
<script>
    (function () {
        var hidden = document.getElementById('conditionInput');
        var buttons = document.querySelectorAll('#filterForm .condition-btn');
        if (!hidden || !buttons.length) return;

        var current = '';
        var initiallyActive = document.querySelector('#filterForm .condition-btn.active');
        if (initiallyActive) {
            current = initiallyActive.getAttribute('data-value');
        }
        hidden.value = current;

        function paint() {
            buttons.forEach(function (b) {
                if (b.getAttribute('data-value') === current) {
                    b.classList.add('active');
                } else {
                    b.classList.remove('active');
                }
            });
        }

        // Перебиваем возможные другие обработчики классов: выполняемся последним
        // и красим состояние сами, поэтому не зависим от того, что делал script.js.
        buttons.forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                var val = btn.getAttribute('data-value');
                current = (current === val) ? '' : val;
                hidden.value = current;
                paint();
            });
        });
    })();
</script>

</body>

</html>
