<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Мои объявления</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
    <style>
        /* Сохранённые фото уже квадратные 200×200 с скруглением,
           поэтому показываем их без обрезки и без принудительного 180×140 из общего стиля. */
        .ad-card img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            border-radius: 0;
            background: transparent;
        }
    </style>
</head>

<body>

<header class="header">
    <div class="logo">
        <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
    </div>
    <div class="header-actions">
        <a sec:authorize="!hasRole('ADMIN')" th:href="@{/product/create}" href="/product/create" class="btn-green">Подать объявление</a>
        <a th:href="@{/profile/edit}" href="/profile/edit" class="profile-link">Редактировать профиль</a>
        <span class="logout-link">Выход</span>
    </div>
</header>

<div class="container">

    <!-- МОИ ОБЪЯВЛЕНИЯ -->
    <h2 class="section-title">
        Мои объявления <span th:text="${approvedProducts.size()}">0</span>
    </h2>

    <div th:if="${approvedProducts.empty}" class="empty-message">
        <p>У вас пока нет одобренных объявлений</p>
    </div>

    <div class="ad-card" th:each="product : ${approvedProducts}">
        <img th:src="${product.imagePath}" th:alt="${product.title}" alt="ad image">

        <div class="ad-info">
            <h3 th:text="${product.title}">Название</h3>
            <div class="price" th:text="${product.price} + ' р'">0 р</div>

            <div class="meta">
                <span th:text="${product.condition?.name}">Б/у</span> <br>
                <span th:text="${product.region}">Регион</span>
            </div>
        </div>

        <div class="ad-actions">
            <a th:href="@{'/product/edit/' + ${product.id}}" class="btn-green">Редактировать</a>
            <form th:action="@{'/product/delete/' + ${product.id}}" method="post" style="display:inline">
                <button type="submit" class="btn-red"
                        onclick="return confirm('Удалить объявление?');">Удалить</button>
            </form>
        </div>
    </div>


    <!-- НА МОДЕРАЦИИ -->
    <h2 class="section-title">
        На модерации <span th:text="${pendingProducts.size()}">0</span>
    </h2>

    <div th:if="${pendingProducts.empty}" class="empty-message">
        <p>Нет объявлений, ожидающих модерации</p>
    </div>

    <div class="ad-card" th:each="product : ${pendingProducts}">
        <img th:src="${product.imagePath}" th:alt="${product.title}" alt="ad image">

        <div class="ad-info">
            <h3 th:text="${product.title}">Название</h3>
            <div class="price" th:text="${product.price} + ' р'">0 р</div>

            <div class="meta">
                <span th:text="${product.condition?.name}">Б/у</span> <br>
                <span th:text="${product.region}">Регион</span>
            </div>
        </div>

        <div class="ad-actions">
            <a th:href="@{'/product/edit/' + ${product.id}}" class="btn-green">Редактировать</a>
            <form th:action="@{'/product/delete/' + ${product.id}}" method="post" style="display:inline">
                <button type="submit" class="btn-red"
                        onclick="return confirm('Удалить объявление?');">Удалить</button>
            </form>
        </div>
    </div>

</div>

<script th:src="@{/js/modals.js}" src="/js/modals.js"></script>
</body>

</html>
