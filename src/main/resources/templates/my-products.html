<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Мои трансферы</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
    <style>
        /* Сохранённые фото уже квадратные 200×200 с скруглением,
           поэтому показываем их без обрезки и без принудительного 180×140 из общего стиля. */
        .ad-card img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            border-radius: 0;
            background: transparent;
        }
    </style>
</head>

<body>

<header class="header">
    <div class="logo">
        <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
    </div>
    <div class="header-actions">
        <a sec:authorize="!hasRole('ADMIN')" th:href="@{/product/create}" href="/product/create" class="btn-green">Подать трансфер</a>
        <a th:href="@{/profile/edit}" href="/profile/edit" class="btn-green">Редактировать профиль</a>
        <a th:href="@{/logout}" href="/logout" class="btn-dark">Выход</a>
    </div>
</header>

<div class="container">

    <!-- МОИ ТРАНСФЕРЫ -->
    <h2 class="section-title">
        Мои трансферы <span th:text="${userProducts.size()}">0</span>
    </h2>

    <div th:if="${userProducts.empty}" class="empty-message">
        <p>У вас пока нет трансферов</p>
    </div>

    <div class="ad-card" th:each="product : ${userProducts}">
        <img th:src="${product.imagePath}" th:alt="${product.title}" alt="ad image">

        <div class="ad-info">
            <h3 th:text="${product.title}">Название</h3>

            <div class="meta">
                <p class="ad-field">
                    <span class="ad-label">Статус:</span>
                    <span th:text="${product.status?.description}">Статус</span>
                </p>
                <p class="ad-field">
                    <span class="ad-label">Тип:</span>
                    <span th:text="${product.condition?.name}">Тип</span>
                </p>
                <p class="ad-field">
                    <span class="ad-label">Регион:</span>
                    <span th:text="${product.region}">Регион</span>
                </p>
                <p class="ad-field">
                    <span class="ad-label">Цена:</span>
                    <span th:text="${product.price} + ' р'">0 р</span>
                </p>
            </div>
        </div>

        <div class="ad-actions">
            <a th:href="@{'/product/edit/' + ${product.id}}" class="btn-green">Редактировать</a>
            <form th:action="@{'/product/delete/' + ${product.id}}" method="post">
                <button type="submit" class="btn-red"
                        onclick="return confirm('Удалить трансфер?');">Удалить</button>
            </form>
        </div>
    </div>

</div>

<script th:src="@{/js/modals.js}" src="/js/modals.js"></script>
</body>

</html>
