<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <a th:href="@{/}" href="index.html">BSUIR TRANSFERMARKT</a>
    </div>
</header>

<div class="login-page">

    <div class="login-card">
        <h2>Регистрация</h2>

        <!-- Успешное сообщение -->
        <div th:if="${successMessage}" class="success-message" th:text="${successMessage}"></div>

        <!-- Глобальные ошибки регистрации (не зависят от BindingResult) -->
        <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${registrationRequest}" method="post">

            <input type="text" th:field="*{firstName}" placeholder="Введите Имя" required>
            <p class="field-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></p>

            <input type="text" th:field="*{lastName}" placeholder="Введите Фамилию" required>
            <p class="field-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></p>

            <input type="email" th:field="*{email}" placeholder="Введите Email" required>
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

            <input type="password" th:field="*{password}" placeholder="Введите пароль" required>
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <input type="password" th:field="*{confirmPassword}" placeholder="Подтвердите пароль" required>
            <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>

            <button type="submit" class="btn-dark full-btn">
                Зарегистрироваться
            </button>

        </form>
    </div>

</div>

</body>

</html>
