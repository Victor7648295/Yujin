<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Пользователи системы</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .admin-content h1 {
            color: #ffffff;
        }
        .search-user input {
            background: #ffffff;
        }
        .alert {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        .actions {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: nowrap;
        }
        .actions form {
            display: inline;
            margin: 0;
        }
        .actions .btn-yellow {
            display: inline-block;
            text-decoration: none;
            line-height: normal;
        }
        .actions .btn-red,
        .actions .btn-green,
        .actions .btn-yellow {
            min-width: 150px;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            box-sizing: border-box;
            line-height: normal;
            vertical-align: middle;
            transition: background 0.2s;
        }
        .actions .btn-yellow,
        .actions .btn-yellow:hover,
        .actions .btn-yellow:focus,
        .actions .btn-yellow:active {
            transform: none;
        }
        .status-cell {
            white-space: nowrap;
        }
        .badge-blocked {
            color: #c0392b;
            font-weight: bold;
        }
        .badge-active {
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <div class="logo">
            <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
        </div>
        <div class="logout btn-dark" onclick="logout()">Выход</div>
    </header>

    <div class="admin-layout">

        <!-- ЛЕВОЕ МЕНЮ -->
        <aside class="admin-sidebar">
            <h3>Админ-панель</h3>
            <ul>
                <li class="active"><a href="/admin/users">Пользователи системы</a></li>
                <li><a href="/admin/moderation">Модерация объявлений</a></li>
                <li><a href="/admin/categories">Управление категориями</a></li>
            </ul>
        </aside>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="admin-content">

            <h1>Пользователи системы</h1>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <!-- Поиск -->
            <form class="search-user" th:action="@{/admin/users}" method="get">
                <input type="text" name="query" placeholder="Поиск пользователя по имени"
                       th:value="${searchQuery}">
                <button type="submit" class="btn-dark">Найти</button>
            </form>

            <!-- Таблица -->
            <div class="users-table">

                <div class="user-row header">
                    <div>Имя</div>
                    <div>Фамилия</div>
                    <div>Email</div>
                    <div>Статус</div>
                    <div class="actions-column"></div>
                </div>

                <div th:if="${#lists.isEmpty(users)}" class="empty-state">
                    Пользователи не найдены
                </div>

                <div th:each="user : ${users}" class="user-row">
                    <div th:text="${user.firstName}">Иван</div>
                    <div th:text="${user.lastName}">Иванов</div>
                    <div th:text="${user.email}">ivanov@mail.ru</div>
                    <div class="status-cell">
                        <span th:if="${user.isActive}" class="badge-active">Активен</span>
                        <span th:unless="${user.isActive}" class="badge-blocked">Заблокирован</span>
                    </div>

                    <div class="actions">
                        <form th:action="@{/admin/users/block/{id}(id=${user.id})}" method="post"
                              onsubmit="return confirm('Заблокировать пользователя?');">
                            <button type="submit" class="btn-red"
                                    th:disabled="${!user.isActive}">Заблокировать</button>
                        </form>
                        <form th:action="@{/admin/users/unblock/{id}(id=${user.id})}" method="post">
                            <button type="submit" class="btn-green">Разблокировать</button>
                        </form>
                        <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn-yellow">Редактировать</a>
                    </div>
                </div>

            </div>

        </main>

    </div>

    <script>
        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                window.location.href = '/logout';
            }
        }
    </script>

</body>

</html>
