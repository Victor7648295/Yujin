<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .alert {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .admin-content h1 {
            text-align: center;
            color: white;
        }
        .user-edit-form {
            max-width: 480px;
            margin: 0 auto;
        }
        .user-edit-form label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
            color: white;
        }
        .user-edit-form input,
        .user-edit-form select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <div class="logo">
            <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
        </div>
        <div class="logout btn-dark" onclick="logout()">Выход</div>
    </header>

    <div class="admin-layout">

        <aside class="admin-sidebar">
            <h3>Панель управления</h3>
            <ul>
                <li class="active"><a href="/admin/users">Пользователи системы</a></li>
                <li><a href="/admin/moderation">Модерация объявлений</a></li>
                <li><a href="/admin/categories">Управление категориями</a></li>
            </ul>
        </aside>

        <main class="admin-content">

            <h1>Редактирование пользователя</h1>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <form class="user-edit-form" th:action="@{/admin/users/edit/{id}(id=${user.id})}" method="post">

                <label>Имя</label>
                <input type="text" name="firstName" th:value="${user.firstName}" required maxlength="50">

                <label>Фамилия</label>
                <input type="text" name="lastName" th:value="${user.lastName}" required maxlength="50">

                <label>Email</label>
                <input type="email" name="email" th:value="${user.email}" required maxlength="100">

                <label>Роль</label>
                <select name="role" required>
                    <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                    <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                </select>

                <label>Новый пароль</label>
                <input type="password" name="newPassword" placeholder="Оставьте пустым, чтобы не менять">

                <label>Повторите пароль</label>
                <input type="password" name="confirmPassword" placeholder="Повторите новый пароль">

                <div class="form-actions">
                    <button type="submit" class="btn-green">Сохранить</button>
                    <a th:href="@{/admin/users}" href="/admin/users" class="btn-dark">Отмена</a>
                </div>

            </form>

        </main>

    </div>

    <script>
        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                window.location.href = '/logout';
            }
        }
    </script>

</body>

</html>
