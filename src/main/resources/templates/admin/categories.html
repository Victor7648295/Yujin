<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Управление категориями</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 0;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px 20px 10px 20px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            color: #2c3e50;
        }

        .close {
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;
            color: #7f8c8d;
            transition: color 0.3s;
        }

        .close:hover {
            color: #e74c3c;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-body label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .modal-body input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .modal-body input:focus {
            outline: none;
            border-color: #3498db;
        }

        .modal-footer {
            padding: 15px 20px 20px 20px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-ok {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .btn-ok:hover {
            background-color: #218838;
        }

        .btn-cancel-modal {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .btn-cancel-modal:hover {
            background-color: #5a6268;
        }

        .alert {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            animation: fadeOut 3s ease-in-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .admin-content h1 {
            color: white;
        }

        .category-actions .btn-yellow,
        .category-actions .btn-red {
            min-width: 150px;
            text-align: center;
            font-size: 14px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .category-actions .btn-red {
            color: black;
        }

        .category-add input {
            background: white;
        }
    </style>
</head>

<body>

<header class="admin-header">
    <div class="logo">
        <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
    </div>
    <div class="logout btn-dark" onclick="logout()">Выход</div>
</header>

<div class="admin-layout">

    <aside class="admin-sidebar">
        <h3>Админ-панель</h3>
        <ul>
            <li><a href="/admin/users">Пользователи системы</a></li>
            <li><a href="/admin/moderation">Модерация объявлений</a></li>
            <li class="active"><a href="/admin/categories">Управление категориями</a></li>
        </ul>
    </aside>

    <main class="admin-content">

        <h1>Управление категориями</h1>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <!-- Добавление категории -->
        <div class="category-add">
            <form action="#" th:action="@{/admin/categories/create}" method="post" style="display: flex; gap: 10px; width: 100%;">
                <input type="text" name="name" placeholder="Имя категории" required>
                <button type="submit" class="btn-dark">Добавить</button>
            </form>
        </div>

        <!-- Список категорий -->
        <div class="categories-box">

            <div class="categories-title">
                Категории
            </div>

            <div th:if="${categories.empty}" class="empty-state">
                Нет добавленных категорий
            </div>

            <div th:each="category : ${categories}">
                <div class="category-row">
                    <span th:text="${category.name}">Недвижимость</span>
                    <div class="category-actions">
                        <button type="button" class="btn-yellow edit-btn" th:data-id="${category.id}" th:data-name="${category.name}">Редактировать</button>
                        <form action="#" th:action="@{/admin/categories/delete/{id}(id=${category.id})}" method="post" style="display: inline;" onsubmit="return confirm('Вы уверены, что хотите удалить эту категорию?');">
                            <button type="submit" class="btn-red">Удалить</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>

    </main>

</div>

<!-- Модальное окно редактирования -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Редактировать категорию</h3>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <form id="editForm" method="post" onsubmit="submitEditForm(event)">
            <div class="modal-body">
                <label for="categoryName">Название категории:</label>
                <input type="text" id="categoryName" name="name" required maxlength="100">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel-modal" onclick="closeModal()">Отмена</button>
                <button type="submit" class="btn-ok">OK</button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentCategoryId = null;

    // Навешиваем обработчики на все кнопки редактирования
    document.addEventListener('DOMContentLoaded', function() {
        const editButtons = document.querySelectorAll('.edit-btn');
        editButtons.forEach(function(button) {
            button.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const name = this.getAttribute('data-name');
                openEditModal(id, name);
            });
        });
    });

    function openEditModal(id, name) {
        currentCategoryId = id;
        document.getElementById('categoryName').value = name;
        document.getElementById('editModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
        currentCategoryId = null;
        document.getElementById('categoryName').value = '';
    }

    function submitEditForm(event) {
        event.preventDefault();

        if (!currentCategoryId) {
            alert('Ошибка: ID категории не найден');
            return;
        }

        const name = document.getElementById('categoryName').value.trim();
        if (!name) {
            alert('Введите название категории');
            return;
        }

        const updateUrl = '/admin/categories/update/' + currentCategoryId;

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = updateUrl;

        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'name';
        input.value = name;

        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
    }

    function logout() {
        if (confirm('Вы уверены, что хотите выйти?')) {
            window.location.href = '/logout';
        }
    }

    window.onclick = function(event) {
        const modal = document.getElementById('editModal');
        if (event.target === modal) {
            closeModal();
        }
    }

    setTimeout(function() {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(function(alert) {
            setTimeout(function() {
                alert.style.display = 'none';
            }, 3000);
        });
    }, 100);
</script>

</body>

</html>
