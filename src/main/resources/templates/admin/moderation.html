<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Модерация объявлений</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .alert {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: white;
        }
        .admin-content h1 {
            color: white;
        }
        #productsList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            align-items: stretch;
        }
        .product-card {
            display: flex;
            flex-direction: column;
        }
        .product-card img {
            height: 220px;
            object-fit: cover;
        }
        .product-buttons {
            margin-top: auto;
        }
        .product-buttons form {
            margin: 0;
            display: block;
        }
        .product-buttons form button {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 25px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
        }
        .product-buttons .btn-yellow {
            background: #c7b900;
            color: black;
        }
        .product-buttons .btn-yellow:hover {
            background: #a59a00;
        }
    </style>
</head>

<body>

    <header class="admin-header">
        <div class="logo">
            <a th:href="@{/}" href="/">BSUIR TRANSFERMARKT</a>
        </div>
        <div class="logout btn-dark" onclick="logout()">Выход</div>
    </header>

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <h3>Панель управления</h3>
            <ul>
                <li><a href="/admin/users">Пользователи системы</a></li>
                <li class="active"><a href="/admin/moderation">Модерация объявлений</a></li>
                <li><a href="/admin/categories">Управление категориями</a></li>
            </ul>
        </aside>

        <!-- CONTENT -->
        <main class="admin-content">

            <h1>Модерация объявлений</h1>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <div th:if="${#lists.isEmpty(products)}" class="empty-state">
                Нет объявлений, ожидающих модерации
            </div>

            <!-- КАРТОЧКИ ОБЪЯВЛЕНИЙ -->
            <div id="productsList" th:unless="${#lists.isEmpty(products)}">
                <div class="product-card" th:each="product : ${products}">

                    <img th:src="@{${product.imagePath}}" th:alt="${product.title}" src="img/image 2.png" alt="Объявление">

                    <div class="product-info">
                        <h3 th:text="${product.title}">Название товара</h3>

                        <div class="meta">
                            <p class="ad-field">
                                <span class="ad-label">Тип:</span>
                                <span th:text="${product.condition?.name}">Тип</span>
                            </p>
                            <p class="ad-field">
                                <span class="ad-label">Регион:</span>
                                <span th:text="${product.region}">Регион</span>
                            </p>
                            <p class="ad-field">
                                <span class="ad-label">Цена:</span>
                                <span th:text="${product.price} + ' р'">0 р</span>
                            </p>
                        </div>
                    </div>

                    <div class="product-buttons">
                        <a th:href="@{/admin/moderation/details/{id}(id=${product.id})}" class="btn-green">Подробнее</a>
                        <form th:action="@{/admin/moderation/approve/{id}(id=${product.id})}" method="post">
                            <button type="submit" class="btn-yellow">Одобрить</button>
                        </form>
                        <form th:action="@{/admin/moderation/reject/{id}(id=${product.id})}" method="post"
                              onsubmit="return confirm('Отклонить объявление?');">
                            <button type="submit" class="btn-red">Отклонить</button>
                        </form>
                    </div>

                </div>
            </div>

        </main>

    </div>

    <script>
        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                window.location.href = '/logout';
            }
        }
    </script>

</body>

</html>
